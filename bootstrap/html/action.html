<script>
	$(function() {
		$("#add").show();
		$("#edit").show();
		$("#del").show();
		$("#query").show();
		$("#QueryTable").bootstrapTable({
			toolbar: '#toolbar',//工具按钮用哪个容器
			clickToSelect: true,// 单击行即可以选中
			singleSelect: true, //设置true禁止多选
			sidePagination: "client",           //分页方式：client客户端分页，server服务端分页（*）
			showExport: true,
			exportDataType: 'all',
			exportTypes: ['doc', 'excel'], //导出文件类型
			showToggle: true,  //是否显示视图切换按钮
			showRefresh: true,// 是否显示刷新按钮
			showColumns: true,//是否显示所有的列
			search: true, // 开启搜索功能
			pagination: true,// 开启分页功能
			sortName: "actionid", // 设置默认排序为 name
			columns: [{
				field: "checked",
				checkbox: true
				}, {
				field: "isused",
				title: "使用",
				align: "center",
				formatter : function (value, row, index) { switch(value) {case 1 :return "是"; default : return "否"}},
				valign: "middle"
				}, {
				field: "actionid",
				title: "权限编号",
				align: "center",
				valign: "middle"
				}, {
				field: "upname",
				title: "上级权限名称",
				align: "center",
				valign: "middle"
				}, {
				field: "upid",
				title: "上级权限",
				visible: false,
				align: "center",
				valign: "middle"
				}, {
				field: "actionname",
				title: "权限名",
				align: "center",
				valign: "middle"
				}, {
				field: "actionorder",
				title: "权限顺序",
				align: "center",
				valign: "middle"
				}, {
				field: "description",
				title: "权限说明",
				align: "center",
				valign: "middle"
				}, {
				field: "params",
				title: "参数",
				align: "center",
				valign: "middle"
				}, {
				field: "actionurl",
				title: "权限路径",
				align: "center",
				valign: "middle"
				}, {
				field: "code",
				title: "编码",
				align: "center",
				valign: "middle"
			}],
			onDblClickRow: function (row) {
					row.checked=true;
					expendp($.fn.zTree.getZTreeObj("Tree_all"),$.fn.zTree.getZTreeObj("Tree_all").getNodeByParam("actionid",row.actionid));
					EditTable(row);
			}
		});
		$("#QueryTable").bootstrapTable('showLoading');

		QueryTable();
		$("#myModal").on("shown.bs.modal",function(e){ if ($("#txt_actionid").attr("disabled")) { $("#txt_upid").focus() } else {$("#txt_actionid").focus()}; });
		$('#upModal').on('hidden.bs.modal', function(e) { $("body").addClass("modal-open");  });
	});
	
	function AddTable() {//新增
		$("#txt_actionid").val("");
		$("#txt_actionid").attr("disabled",false);
		var selected=$.fn.zTree.getZTreeObj("Tree_all").getSelectedNodes();
		if (selected.length>0) {
			console.log(selected);
			$("#txt_upid").val(selected[0].actionname);$("#txt_upid").data("value",selected[0].actionid);
		} else {
			$("#txt_upid").val("");$("#txt_upid").data("value","");
		}
		$("#txt_actionname").val("");
		$("#txt_actionorder").val("");
		$("#txt_description").val("");
		$("#txt_params").val("");
		$("#txt_actionurl").val("");
		$("#txt_code").val("");
        $("#myModalLabel").html("新增");
        $("#myModal").modal();
	};
	
	function EditTable(row) {
		if (row==null) {
			if ($("#QueryTable").bootstrapTable('getSelections').length == 0) {
				alert("请先选择要修改的数据!");
				return;
			};
			row=$("#QueryTable").bootstrapTable('getSelections')[0];
		}
		if (row.actionid!=null) { $("#txt_actionid").val(row.actionid) } else { $("#txt_actionid").val("")};
		$("#txt_actionid").attr("disabled",true);
		if (row.upid) {
			if (row.upid!=0) {
				expendp($.fn.zTree.getZTreeObj("Tree_up"),$.fn.zTree.getZTreeObj("Tree_up").getNodeByParam("actionid",row.upid));
				$.fn.zTree.getZTreeObj("Tree_up").selectNode($.fn.zTree.getZTreeObj("Tree_up").getNodeByParam("actionid",row.upid),true);
			};
			$("#txt_upid").val(row.upname);
			$("#txt_upid").data("value",row.upid);
		} else {
			$("#txt_upid").val("");
			$("#txt_upid").data("value","");
		};
		if (row.actionname!=null) { $("#txt_actionname").val(row.actionname) } else { $("#txt_actionname").val("")};
		if (row.actionorder!=null) { $("#txt_actionorder").val(row.actionorder) } else { $("#txt_actionorder").val("")};
		if (row.description!=null) { $("#txt_description").val(row.description) } else { $("#txt_description").val("")};
		if (row.params!=null) { $("#txt_params").val(row.params) } else { $("#txt_params").val("")};
		if (row.actionurl!=null) { $("#txt_actionurl").val(row.actionurl) } else { $("#txt_actionurl").val("")};
		if (row.code!=null) { $("#txt_code").val(row.code) } else { $("#txt_code").val("")};
		expendp($.fn.zTree.getZTreeObj("Tree_all"),$.fn.zTree.getZTreeObj("Tree_all").getNodeByParam("actionid",row.actionid));
        $("#myModalLabel").html("修改");
        $("#myModal").modal();
	};
	
	function CommitTable() {
		var commitdata={
			actionid:$("#txt_actionid").val(),
			upid:$("#txt_upid").data("value"),
			actionname:$("#txt_actionname").val(),
			actionorder:$("#txt_actionorder").val(),
			description:$("#txt_description").val(),
			params:$("#txt_params").val(),
			actionurl:$("#txt_actionurl").val(),
			code:$("#txt_code").val()
		};
		if ($("#myModalLabel").html()=="新增") {
			ajaxarr([{
				url:"/func/public/action_add?operatorno="+employeeno+"&token="+token,
				title:"新增数据失败！",
				data:commitdata,
				func:function(data) {
					alert("新增数据成功！id："+data.id);
					QueryTable(data.id);
					$("#myModal").modal("hide");
				}
			}]);
		} else {
			ajaxarr([{
				url:"/func/public/action_edit?operatorno="+employeeno+"&token="+token,
				title:"修改数据失败！",
				data:commitdata,
				func:function(data) {
					alert("修改数据成功！");
					QueryTable(commitdata.actionid);
					$("#myModal").modal("hide");
				}
			}]);		
		};
	};
	
	function DelTable() {
        var row = $("#QueryTable").bootstrapTable('getSelections')[0];
        if(row == null) {
            alert("请先选择要要显示/隐藏的数据!");
            return;
        };       
		var info=(row.isused==0) ? "显示" : "隐藏" ;
		if(confirm( "您真的确定要"+info+"吗？") == true) {
			ajaxarr([{
				url: "/func/public/action_del?operatorno=" + employeeno + "&token=" + token,
				title: info+"数据失败！",
				data:{actionid:row.actionid,isused:(row.isused==0) ? 1 : null},
				func: function(data) {
					alert(info+"成功！");
                    QueryTable();
				}
			}]);
		}
	};
	
	function QueryTable(id) {
		$("#QueryTable").bootstrapTable('showLoading');
		ajaxarr([{
				url:"/func/public/action_query?operatorno=" + employeeno + "&token=" + token,
				title:"获取权限名信息失败，请刷新！",
				data:{},
				func: function (data) {
					setting={view: {selectedMulti: false,showIcon: true },
						data: {	key: { name: "actionname"}, simpleData: {	enable: true,	idKey: "actionid",	pIdKey: "upid",	rootPId: 0}	},
						callback: {
							onDblClick: function(event, treeId, treeNode) {
								$("#txt_actionid").val(treeNode.actionname);
								$("#txt_actionid").data("value",treeNode.actionid);
								$("#actionModal").modal("hide");
							}
						}
					};
					$.fn.zTree.init($("#Tree_up"),setting , data.rows);							
					setting={view: {selectedMulti: false,showIcon: true },
						data: {	key: { name: "actionname"}, simpleData: {	enable: true,	idKey: "actionid",	pIdKey: "upid",	rootPId: 0}	},
						callback: {
							onClick : function(event, treeId, treeNode, clickFlag) {
								$("#QueryTable").bootstrapTable("resetSearch", treeNode.actionid);
							},
							onDblClick: function(event, treeId, treeNode) {
								$("#QueryTable").bootstrapTable("resetSearch", treeNode.actionid);
								$("#QueryTable").bootstrapTable('uncheckAll');
								$("#QueryTable").bootstrapTable("checkBy",{field:"actionid",values:[treeNode.actionid]});
								EditTable();//有点问题
							}
						}
					};
					var zTree=$.fn.zTree.init($("#Tree_all"),setting , data.rows);	
					if (id) {expendp(zTree,zTree.getNodeByParam("actionid",id));};
					$("#QueryTable").bootstrapTable('hideLoading');
					if (data.total==0) { $("#QueryTable").bootstrapTable('removeAll'); } 
					else {	
						$("#QueryTable").bootstrapTable('load', data.rows); 
						if (id) {
							for (var i=data.total;i>0;i--) {
								if (data.rows[i-1].typeid==id) {
									$("#QueryTable").bootstrapTable('selectPage', Math.ceil(i/$("#QueryTable").bootstrapTable('getOptions').pageSize));
									break;
								};							
							}
						}
					};
				}
		}]);		
	};

</script>
<div class="row clearfix">
	<div class="col-3 column">
		<h4> 选择使用:</h4>
		<div >
			<ul id="Tree_all" class="ztree" ></ul>
		</div>
	</div>
	<div class="col-9 column">
		<div id="toolbar" class="btn-group">
			<button id="add" type="button" style="display:none;" class="btn btn-default" onclick="AddTable()"><span class="glyphicon glyphicon-plus" aria-hidden="true"></span>新增</button>
			<button id="edit" type="button" style="display:none;" class="btn btn-default" onclick="EditTable()"><span class="glyphicon glyphicon-pencil" aria-hidden="true"></span>修改</button>
			<button id="del" type="button" style="display:none;" class="btn btn-default" onclick="DelTable()"><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>显示/隐藏</button>
			<button id="query" type="button" style="display:none;" class="btn btn-default" onclick="QueryTable()"><span class="glyphicon glyphico-query" aria-hidden="true"></span>查询</button>
		</div>
		<table id="QueryTable" class='table-striped'></table>
	</div>
</div>
<div class="modal fade" id="myModal" tabindex="-1" >
	<div class="modal-dialog" >
		<div class="modal-content" >
			<div class="modal-header">
				<h4 class="modal-title" id="myModalLabel"></h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<label for="txt_actionid">权限编号</label><input id="txt_actionid" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_upid.focus()}}" type="text" placeholder="权限编号"/>
				<label for="txt_upid">上级权限</label><input id="txt_upid" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_actionname.focus()}}" data-target="#upModal" data-toggle="modal" type="text" placeholder="上级权限"/>
				<label for="txt_actionname">权限名</label><input id="txt_actionname" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_actionorder.focus()}}" type="text" placeholder="权限名"/>
				<label for="txt_actionorder">权限顺序</label><input id="txt_actionorder" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_description.focus()}}" type="text" placeholder="权限顺序"/>
				<label for="txt_description">权限说明</label><input id="txt_description" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_params.focus()}}" type="text" placeholder="权限说明"/>
				<label for="txt_params">参数</label><input id="txt_params" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_actionurl.focus()}}" type="text" placeholder="参数"/>
				<label for="txt_actionurl">权限路径</label><input id="txt_actionurl" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_code.focus()}}" type="text" placeholder="权限路径"/>
				<label for="txt_code">编码</label><input id="txt_code" class="form-control" onkeypress="{ if (event.keyCode==13) {SaveModal.focus()}}" type="text" placeholder="编码"/>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-primary" id="SaveModal" onclick="CommitTable()"><span class="glyphicon glyphicon-floppy-disk" aria-hidden="true"></span>保存</button>
				<button type="button" class="btn btn-default" data-dismiss="modal" ><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>关闭</button>
			</div>
		</div>
	</div>
</div>
<div class="modal fade" id="upModal" tabindex="-1">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header" >
				<h4 class="modal-title" >选择上级</h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<ul id="Tree_up" class="ztree"></ul>
			</div>
			<div class="modal-footer" >
				<button type="button" class="btn btn-primary" data-dismiss="modal" onclick="{$('#txt_upid').val($.fn.zTree.getZTreeObj('Tree_up').getSelectedNodes()[0].actionname);$('#txt_upid').data('value',$.fn.zTree.getZTreeObj('Tree_up').getSelectedNodes()[0].actionid);}">确认</button>
				<button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
			</div>
		</div>
	</div>
</div>
