<script>
	var tableoption={
			toolbar: '#toolbar',//工具按钮用哪个容器
			clickToSelect: true,// 单击行即可以选中
			singleSelect: true, //设置true禁止多选
			sidePagination: "client",           //分页方式：client客户端分页，server服务端分页（*）
            showPaginationSwitch: true,
			showExport: true,
			exportDataType: 'all',
			exportTypes: ['doc', 'excel'], //导出文件类型
			showToggle: true,  //是否显示视图切换按钮
			showRefresh: true,// 是否显示刷新按钮
			showColumns: true,//是否显示所有的列
			search: true, // 开启搜索功能
			pagination: true,// 开启分页功能
			sortName: "sysorgid", // 设置默认排序为 name
			columns: [{				field: "checked",				checkbox: true				}, {				field: "orgtype",				title: "部门类型id",				visible: false,				align: "center",				valign: "middle"				}, {				field: "orgtypename",				title: "部门类型名",				align: "center",				valign: "middle"				}, {				field: "description",				title: "说明",				align: "center",				valign: "middle"				}, {				field: "sysorgname",				title: "部门名称",				align: "center",				valign: "middle"				}, {				field: "sysorgid",				title: "部门id",				visible: false,				align: "center",				valign: "middle"				}, {				field: "upname",				title: "上级部门名称",				align: "center",				valign: "middle"				}, {				field: "upid",				title: "上级部门",				visible: false,				align: "center",				valign: "middle"				}, {				field: "isused",				title: "显示",				align: "center",				formatter : function (value, row, index) { switch(value) {case 1 :return "是"; default : return "否"}},				valign: "middle"			}],
			onDblClickRow: function (row) {
				if (actions.includes("115")) {
					row.checked=true;
					expendp($.fn.zTree.getZTreeObj("Tree_all"),$.fn.zTree.getZTreeObj("Tree_all").getNodeByParam("sysorgid",row.sysorgid));
					EditTable(row);
				}
			}
		}

	$(function() {
		checkaction(new Array("114","115","117","118"));
		$("#QueryTable").bootstrapTable(tableoption);
		$("#QueryTable").bootstrapTable('showLoading');
		ajaxarr([{				url:"sysinfo/orgtype_query",				data:{token:token},				title:"获取部门类型名信息失败！",				func: function(data) {					var orgtype="<option value=''>请选择部门类型名</option>";					if (data.info.total>0) {						for (i=0,j=data.info.rows.length;i<j;i++) { orgtype+="<option value='"+ data.info.rows[i].orgtypeid + "'>"+data.info.rows[i].orgtypename+"</option>";}					}					$("#txt_orgtype").html(orgtype);				$(".selectpicker").selectpicker("refresh");				}		}]);
		$('#upModal').on('hidden.bs.modal', function(e) { $("body").addClass("modal-open");  });
		$("#myModal").on("shown.bs.modal",function(e){ if ($("#txt_sysorgid").attr("disabled")) { $("#txt_upid").focus() } else {$("#txt_sysorgid").focus()}; });
		QueryTable();
		$(".selectpicker").selectpicker("refresh");
	});
	
	function AddTable() {//新增
		$("#txt_orgtype").selectpicker("val","");		$("#txt_orgtype").val("");		$("#txt_description").val("");		$("#txt_sysorgname").val("");		$("#txt_sysorgid").val("");		$("#txt_sysorgid").attr("disabled",false);		$("#txt_upid").val("");$("#txt_upid").data("value","");
        $("#myModalLabel").html("新增");
        $("#myModal").modal();
	};
	
	function EditTable(row) {
		if (row==null) {
			if ($("#QueryTable").bootstrapTable('getSelections').length == 0) {
				alert("请先选择要修改的数据!");
				return;
			};
			row=$("#QueryTable").bootstrapTable('getSelections')[0];
		}
		if (row.orgtype!=null) { $("#txt_orgtype").selectpicker("val",row.orgtype) } else { $("#txt_orgtype").selectpicker("val","")};		if (row.orgtype!=null) { $("#txt_orgtype").val(row.orgtype) } else { $("#txt_orgtype").val("")};		if (row.description!=null) { $("#txt_description").val(row.description) } else { $("#txt_description").val("")};		if (row.sysorgname!=null) { $("#txt_sysorgname").val(row.sysorgname) } else { $("#txt_sysorgname").val("")};		if (row.sysorgid!=null) { $("#txt_sysorgid").val(row.sysorgid) } else { $("#txt_sysorgid").val("")};		$("#txt_sysorgid").attr("disabled",true);		if (row.upid) {			if (row.upid!=0) {				expendp($.fn.zTree.getZTreeObj("Tree_up"),$.fn.zTree.getZTreeObj("Tree_up").getNodeByParam("sysorgid",row.upid));				$.fn.zTree.getZTreeObj("Tree_up").selectNode($.fn.zTree.getZTreeObj("Tree_up").getNodeByParam("sysorgid",row.upid),true);			};			$("#txt_upid").val(row.upname);			$("#txt_upid").data("value",row.upid);		} else {			$("#txt_upid").val("");			$("#txt_upid").data("value","");		};
		expendp($.fn.zTree.getZTreeObj("Tree_all"),$.fn.zTree.getZTreeObj("Tree_all").getNodeByParam("sysorgid",row.sysorgid));
        $("#myModalLabel").html("修改");
        $("#myModal").modal();
	};
	
	function CommitTable() {
		var commitdata={
			orgtype:$("#txt_orgtype").val(),			orgtype:$("#txt_orgtype").val(),			description:$("#txt_description").val(),			sysorgname:$("#txt_sysorgname").val(),			sysorgid:$("#txt_sysorgid").val(),			upid:$("#txt_upid").data("value"),			token:token,
		};
		if ($("#myModalLabel").html()=="新增") {
			ajaxarr([{
				url:"sysinfo/sysorg_add",
				title:"新增数据失败！",
				data:commitdata,
				func:function(data) {
					alert("新增数据成功！id："+data.info.id);
					QueryTable(data.info.id);
					$("#myModal").modal("hide");
				}
			}]);
		} else {
			ajaxarr([{
				url:"sysinfo/sysorg_edit",
				title:"修改数据失败！",
				data:commitdata,
				func:function(data) {
					alert("修改数据成功！");
					QueryTable(commitdata.sysorgid);
					$("#myModal").modal("hide");
				}
			}]);		
		};
	};
	
	function DelTable() {
        var row = $("#QueryTable").bootstrapTable('getSelections')[0];
        if(row == null) {
            alert("请先选择要要显示/隐藏的数据!");
            return;
        };       
		var info=(row.isused==0) ? "显示" : "隐藏" ;
		if(confirm( "您真的确定要"+info+"吗？") == true) {
			ajaxarr([{
				url: "sysinfo/sysorg_del",
				title: info+"数据失败！",
				data:{token:token,sysorgid:row.sysorgid,isused:(row.isused==0) ? 1 : null},
				func: function(data) {
					alert(info+"成功！");
                    QueryTable();
				}
			}]);
		}
	};
	
	function QueryTable(id) {
		$("#QueryTable").bootstrapTable('showLoading');
		ajaxarr([{
				url:"sysinfo/sysorg_query",
				title:"获取部门信息失败，请刷新！",
				data:{token:token},
				func: function (data) {
					setting={view: {selectedMulti: false,showIcon: true },
						data: {	key: { name: "sysorgname"}, simpleData: {	enable: true,	idKey: "sysorgid",	pIdKey: "upid",	rootPId: 0}	},
						callback: {
							onDblClick: function(event, treeId, treeNode) {
								$("#txt_sysorgid").val(treeNode.sysorgname);
								$("#txt_sysorgid").data("value",treeNode.sysorgid);
								$("#sysorgModal").modal("hide");
							}
						}
					};
					$.fn.zTree.init($("#Tree_up"),setting , data.info.rows);							
					setting={view: {selectedMulti: false,showIcon: true },
						data: {	key: { name: "sysorgname"}, simpleData: {	enable: true,	idKey: "sysorgid",	pIdKey: "upid",	rootPId: 0}	},
						callback: {
							onClick : function(event, treeId, treeNode, clickFlag) {
								$("#QueryTable").bootstrapTable("resetSearch", treeNode.sysorgid);
							},
							onDblClick: function(event, treeId, treeNode) {
								$("#QueryTable").bootstrapTable('uncheckAll');
								$("#QueryTable").bootstrapTable("checkBy",{field:"sysorgid",values:[treeNode.sysorgid]});
								EditTable();//有点问题
							}
						}
					};
					var zTree=$.fn.zTree.init($("#Tree_all"),setting , data.info.rows);	
					if (id) {expendp(zTree,zTree.getNodeByParam("sysorgid",id));};
					if (data.info.total==0) { $("#QueryTable").bootstrapTable('removeAll'); } 
					else {	
						$("#QueryTable").bootstrapTable('load', data.info.rows); 
						if (id) {
							for (var i=data.info.total;i>0;i--) {
								if (data.info.rows[i-1].typeid==id) {
									$("#QueryTable").bootstrapTable('selectPage', Math.ceil(i/$("#QueryTable").bootstrapTable('getOptions').pageSize));
									break;
								};							
							}
						}
					};
					$("#QueryTable").bootstrapTable('hideLoading');
				}
		}]);		
	};

</script>
<!-- <h4> 选择部门类型id:</h4> -->
<div >
	<ul id="Tree_all" class="ztree" ></ul>
</div>
<table id="QueryTable" class='table-striped'></table>
<div id="toolbar" class="btn-group">
	<button id="114" type="button" style="display:none;" class="btn btn-default" onclick="AddTable()"><span class="glyphicon glyphicon-plus" aria-hidden="true"></span>新增</button>
	<button id="115" type="button" style="display:none;" class="btn btn-default" onclick="EditTable()"><span class="glyphicon glyphicon-pencil" aria-hidden="true"></span>修改</button>
	<button id="117" type="button" style="display:none;" class="btn btn-default" onclick="DelTable()"><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>显示/隐藏</button>
	<button id="118" type="button" style="display:none;" class="btn btn-default" onclick="QueryTable()"><span class="glyphicon glyphico-query" aria-hidden="true"></span>查询</button>
</div>
<div class="modal fade" id="myModal" tabindex="-1" >
	<div class="modal-dialog" >
		<div class="modal-content" >
			<div class="modal-header">
				<h4 class="modal-title" id="myModalLabel"></h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body form-inline">
				<label for="txt_orgtype" class="col-lg-3 text-center">部门类型名</label><select id="txt_orgtype" class="selectpicker form-control col-lg-3" onkeypress="{ if (event.keyCode==13) {txt_description.focus()}}" title="请选择部门类型id"></select>				<label for="txt_orgtype" class="col-lg-3 text-center">部门类型id</label><input id="txt_orgtype" class="form-control col-lg-3" onkeypress="{ if (event.keyCode==13) {txt_description.focus()}}" type="text" placeholder="部门类型id"/>				<label for="txt_description" class="col-lg-3 text-center">说明</label><input id="txt_description" class="form-control col-lg-3" onkeypress="{ if (event.keyCode==13) {txt_sysorgname.focus()}}" type="text" placeholder="说明"/>				<label for="txt_sysorgname" class="col-lg-3 text-center">部门名称</label><input id="txt_sysorgname" class="form-control col-lg-3" onkeypress="{ if (event.keyCode==13) {txt_sysorgid.focus()}}" type="text" placeholder="部门名称"/>				<label for="txt_sysorgid" class="col-lg-3 text-center">部门id</label><input id="txt_sysorgid" class="form-control col-lg-3" disabled="disabled" onkeypress="{ if (event.keyCode==13) {txt_systemid.focus()}}" type="text" placeholder="部门id"/>				<label for="txt_upid" class="col-lg-3 text-center">上级部门</label><input id="txt_upid" class="form-control col-lg-3" onkeypress="{ if (event.keyCode==13) {txt_idcount.focus()}}" data-target="#upModal" data-toggle="modal" type="text" placeholder="上级部门"/>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-primary" id="SaveModal" onclick="CommitTable()"><span class="glyphicon glyphicon-floppy-disk" aria-hidden="true"></span>保存</button>
				<button type="button" class="btn btn-default" data-dismiss="modal" ><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>关闭</button>
			</div>
		</div>
	</div>
</div>
<div class="modal fade" id="upModal" tabindex="-1">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header" >
				<h4 class="modal-title" >选择上级</h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<ul id="Tree_up" class="ztree"></ul>
			</div>
			<div class="modal-footer" >
				<button type="button" class="btn btn-primary" data-dismiss="modal" onclick="{$('#txt_upid').val($.fn.zTree.getZTreeObj('Tree_up').getSelectedNodes()[0].sysorgname);$('#txt_upid').data('value',$.fn.zTree.getZTreeObj('Tree_up').getSelectedNodes()[0].sysorgid);}">确认</button>
				<button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
			</div>
		</div>
	</div>
</div>
<div class="modal fade" id="upidModal" tabindex="-1">	<div class="modal-dialog">		<div class="modal-content">			<div class="modal-header" >				<h4 class="modal-title" >选择上级部门</h4>				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>			</div>			<div class="modal-body">				<ul id="Tree_upid" class="ztree" ></ul>			</div>			<div class="modal-footer" >				<button type="button" class="btn btn-primary" data-dismiss="modal" onclick="{$('#txt_upid').val($.fn.zTree.getZTreeObj('Tree_upid').getSelectedNodes()[0].sysorgid);$('#txt_upid').data('value',$.fn.zTree.getZTreeObj('Tree_upid').getSelectedNodes()[0].sysorgid);}">确认</button>				<button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>			</div>		</div>	</div></div>
