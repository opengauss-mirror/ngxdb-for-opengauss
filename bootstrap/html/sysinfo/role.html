<script>
	var tableoption={
			toolbar: '#toolbar',//工具按钮用哪个容器
			clickToSelect: true,// 单击行即可以选中
			singleSelect: true, //设置true禁止多选
			sidePagination: "client",           //分页方式：client客户端分页，server服务端分页（*）
			showExport: true,
			exportDataType: 'all',
			exportTypes: ['doc', 'excel'], //导出文件类型
			showToggle: true,  //是否显示视图切换按钮
			showRefresh: true,// 是否显示刷新按钮
			showColumns: true,//是否显示所有的列
			search: true, // 开启搜索功能
			pagination: true,// 开启分页功能
			sortName: "roleinfoid", // 设置默认排序为 name
			columns: [{
				field: "checked",
				checkbox: true
				}, {
				field: "roleinfoid",
				title: "角色编号",
				visible: false,
				align: "center",
				valign: "middle"
				}, {
				field: "roleinfoname",
				title: "角色名",
				align: "center",
				valign: "middle"
				}, {
				field: "description",
				title: "描述",
				align: "center",
				valign: "middle"
				}, {
				field: "isused",
				title: "显示",
				align: "center",
				formatter : function (value, row, index) { switch(value) {case 1 :return "是"; default : return "否"}},
				valign: "middle"
			}],
			onDblClickRow: function (row) {
				if (actions.includes("112")) {
					row.checked=true;
					EditTable(row);
				}
			},
		};
		
	$(function() {
		checkaction(new Array("111","112","113","114"));		
		$("#QueryTable").bootstrapTable(tableoption);
		$("#QueryTable").bootstrapTable('showLoading');
		ajaxarr([{
				url:"/func/operator/action_query?operatorno="+employeeno+"&token="+token+"&isused=1",
				title:"获取权限名信息失败！",
				func: function(data) {
					setting={view: {selectedMulti: true,showIcon: true },
						check: { enable :true , chkStyle: "checkbox", chkboxType : {"Y" :"ps","N":"ps"} },
						data: {	key: { name: "actionname"}, simpleData: {	enable: true,	idKey: "actionid",	pIdKey: "upid",	rootPId: 0}	},
						onDblClick: function(event, treeId, treeNode) {
							$("#detail_actionid").val(treeNode.actionname);
							$("#detail_actionid").data("value",treeNode.actionid);
							$("#actionidModal").modal("hide");
						}
					}
					$.fn.zTree.init($("#Tree_actionid"),setting , data.rows);	
				}
			}
		]);
		QueryTable();
		$("#myModal").on("shown.bs.modal",function(e){ if ($("#txt_roleinfoid").attr("disabled")) { $("#txt_txt_roleinfoname").focus() } else {$("#txt_roleinfoid").focus()}; });
	});
	
	function AddTable() {//新增
		$("#txt_roleinfoid").val("");
		$("#txt_roleinfoid").attr("disabled",false);
		$("#txt_roleinfoname").val("");
		$("#txt_description").val("");
		zTree=$.fn.zTree.getZTreeObj("Tree_actionid");
		zTree.checkAllNodes(false);
		zTree.expandAll(false);
        $("#myModalLabel").html("新增");
        $("#myModal").modal();
	};
	
	function EditTable(row) {
		if (row==null) {
			if ($("#QueryTable").bootstrapTable('getSelections').length == 0) {
				alert("请先选择要修改的数据!");
				return;
			};
			row=$("#QueryTable").bootstrapTable('getSelections')[0];
		}
		if (row.roleinfoid!=null) { $("#txt_roleinfoid").val(row.roleinfoid) } else { $("#txt_roleinfoid").val("")};
		$("#txt_roleinfoid").attr("disabled",true);
		if (row.roleinfoname!=null) { $("#txt_roleinfoname").val(row.roleinfoname) } else { $("#txt_roleinfoname").val("")};
		if (row.description!=null) { $("#txt_description").val(row.description) } else { $("#txt_description").val("")};
		var zTree=$.fn.zTree.getZTreeObj("Tree_actionid");
		zTree.checkAllNodes(false);
		zTree.expandAll(false);
		if (row.detail!=null) {
			var detail=JSON.parse(JSON.stringify(row.detail));
			for (var i=0,j=detail.length;i<j; i++) {
				if (detail[i].permissiontype==1) {
					var getnode=zTree.getNodeByParam("actionid",detail[i].actionid);
					if (getnode!=null) {
						zTree.checkNode(getnode,true,true);
						expendp(zTree,getnode);
					}
				} ;
			};
		};
		$("#myModalLabel").html("修改");
        $("#myModal").modal();
	};
	
	function CommitTable() {
		var node=$.fn.zTree.getZTreeObj("Tree_actionid").getCheckedNodes(true);
		var detail=[];
		for (var i=0,j=node.length;i<j;i++) {
			if (node[i].getCheckStatus().half) { continue };
			if (node[i].getParentNode()===null) { detail.push({permissiontype:1,actionid:node[i].actionid});continue };
			if ((node[i].getParentNode().checked) && (!node[i].getParentNode().getCheckStatus().half)) { continue };
			detail.push({permissiontype:1,actionid:node[i].actionid});	
		};
		var commitdata={
			roleinfoid:$("#txt_roleinfoid").val(),
			roleinfoname:$("#txt_roleinfoname").val(),
			description:$("#txt_description").val(),
			detail:JSON.stringify(detail)
		};
		if ($("#myModalLabel").html()=="新增") {
			ajaxarr([{
				url:"/func/operator/roleinfo_addjson?operatorno="+employeeno+"&token="+token,
				title:"新增数据失败！",
				data:commitdata,
				func:function(data) {
					alert("新增数据成功！id："+data.id);
					QueryTable(data.id);
				}
			}]);
		} else {
			ajaxarr([{
				url:"/func/operator/roleinfo_editjson?operatorno="+employeeno+"&token="+token,
				title:"修改数据失败！",
				data:commitdata,
				func:function(data) {
					alert("修改数据成功！");
					QueryTable(commitdata.roleinfoid);
				}
			}]);		
		};
	};
	
	function DelTable() {
		var row=$("#QueryTable").bootstrapTable('getSelections')[0];
		if (row==null) {
			alert("请先选择要显示/隐藏的数据!");
			return;
		}
		var info=(row.isused==0) ? "显示" : "隐藏" ;
		if(confirm( "您真的确定要"+info+"吗？") == true) {
			ajaxarr([{
				url: "/func/operator/roleinfo_deljson?operatorno=" + employeeno + "&token=" + token,
				title: info + "数据失败！",
				data:{roleinfoid:row.roleinfoid,isused:(row.isused==0) ? 1 : null},
				func: function(data) {
					alert(info+"成功！");
                    QueryTable();
				}
			}]);
		}
	};
	
	function QueryTable(id) {
		$("#QueryTable").bootstrapTable('showLoading');
		ajaxarr([{
				url:"/func/operator/roleinfo_queryjson?operatorno=" + employeeno + "&token=" + token,
				title:"获取角色信息失败，请刷新！",
				data:{},
				func: function (data) {
					$("#QueryTable").bootstrapTable('hideLoading');
					if (data.total==0) { $("#QueryTable").bootstrapTable('removeAll'); } 
					else {	
						$("#QueryTable").bootstrapTable('load', data.rows); 
						if (id) {
							for (var i=data.total;i>0;i--) {
								if (data.rows[i-1].roleinfoid==id) {
									$("#QueryTable").bootstrapTable('selectPage', Math.ceil(i/$("#QueryTable").bootstrapTable('getOptions').pageSize));
									break;
								};							
							}
						}
					};
				}
		}]);		
	};
</script>
<div class="row clearfix">
	<div class="col-12 column">
		<div id="toolbar" class="btn-group">
			<button id="111" type="button" style="display:none;" class="btn btn-default" onclick="AddTable()"><span class="glyphicon glyphicon-plus" aria-hidden="true"></span>新增</button>
			<button id="112" type="button" style="display:none;" class="btn btn-default" onclick="EditTable()"><span class="glyphicon glyphicon-pencil" aria-hidden="true"></span>修改</button>
			<button id="113" type="button" style="display:none;" class="btn btn-default" onclick="DelTable()"><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>显示/隐藏</button>
			<button id="114" type="button" style="display:none;" class="btn btn-default" onclick="QueryTable()"><span class="glyphicon glyphico-query" aria-hidden="true"></span>查询</button>
		</div>
		<table id="QueryTable" class='table-striped'></table>
	</div>
</div>
<div class="modal fade" id="myModal" tabindex="-1" >
	<div class="modal-dialog" >
		<div class="modal-content" >
			<div class="modal-header">
				<h4 class="modal-title" id="myModalLabel"></h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<label for="txt_roleinfoid">角色编号</label><input id="txt_roleinfoid" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_roleinfoname.focus()}}" type="text" placeholder="角色编号"/>
				<label for="txt_roleinfoname">角色名</label><input id="txt_roleinfoname" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_description.focus()}}" type="text" placeholder="角色名"/>
				<label for="txt_description">描述</label><input id="txt_description" class="form-control" onkeypress="{ if (event.keyCode==13) {SaveModal.focus()}}" type="text" placeholder="描述"/>
			</div>
			<div>
				<ul id="Tree_actionid" class="ztree" ></ul>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-primary" id="SaveModal" data-dismiss="modal" onclick="CommitTable()"><span class="glyphicon glyphicon-floppy-disk" aria-hidden="true"></span>保存</button>
				<button type="button" class="btn btn-default" data-dismiss="modal" ><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>关闭</button>
			</div>
		</div>
	</div>
</div>
<div class="modal fade" id="myDetailModal" tabindex="-1" >
	<div class="modal-dialog" >
		<div class="modal-content" >
			<div class="modal-header">
				<h4 class="modal-title" id="myDetailModalLabel"></h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<label for="detail_roleid">角色编号</label><input id="detail_roleid" class="form-control" onkeypress="{ if (event.keyCode==13) {detail_permissionid.focus()}}" type="text" placeholder="角色编号"/>
				<label for="detail_permissionid">角色权限编号</label><input id="detail_permissionid" class="form-control" onkeypress="{ if (event.keyCode==13) {detail_permissiontype.focus()}}" type="text" placeholder="角色权限编号"/>
				<label for="detail_permissiontype">权限类型</label><input id="detail_permissiontype" class="form-control" onkeypress="{ if (event.keyCode==13) {detail_ifpermission.focus()}}" type="text" placeholder="权限类型"/>
				<label for="detail_ifpermission">允许</label><input id="detail_ifpermission" class="form-control" onkeypress="{ if (event.keyCode==13) {detail_permissionorder.focus()}}" type="text" placeholder="允许"/>
				<label for="detail_permissionorder">权限级别</label><input id="detail_permissionorder" class="form-control" onkeypress="{ if (event.keyCode==13) {detail_params.focus()}}" type="text" placeholder="权限级别"/>
				<label for="detail_params">参数</label><input id="detail_params" class="form-control" onkeypress="{ if (event.keyCode==13) {detail_actionid.focus()}}" type="text" placeholder="参数"/>
				<label for="detail_actionid">权限编号</label><input id="detail_actionid" class="form-control" onkeypress="{ if (event.keyCode==13) {SaveDetailModal.focus()}}" data-target="#actionidModal" data-toggle="modal" type="text" placeholder="权限编号"/>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-primary" id="SaveDetailModal" data-dismiss="modal" onclick="CommitDetailTable($(this).val())"><span class="glyphicon glyphicon-floppy-disk" aria-hidden="true"></span>保存</button>
				<button type="button" class="btn btn-default" data-dismiss="modal" ><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>关闭</button>
			</div>
		</div>
	</div>
</div>
