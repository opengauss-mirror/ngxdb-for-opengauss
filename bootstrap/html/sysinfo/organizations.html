<script>
	$(function() {
		checkaction(new Array("219","220","221","222"));
		$("#QueryTable").bootstrapTable({
			toolbar: '#toolbar',//工具按钮用哪个容器
			clickToSelect: true,// 单击行即可以选中
			singleSelect: true, //设置true禁止多选
			sidePagination: "client",           //分页方式：client客户端分页，server服务端分页（*）
			showExport: true,
			exportDataType: 'all',
			exportTypes: ['doc', 'excel'], //导出文件类型
			showToggle: true,  //是否显示视图切换按钮
			showRefresh: true,// 是否显示刷新按钮
			showColumns: true,//是否显示所有的列
			search: true, // 开启搜索功能
			pagination: true,// 开启分页功能
			sortName: "orgid", // 设置默认排序为 name
			columns: [{
				field: "checked",
				checkbox: true
				}, {
				field: "isused",
				title: "显示",
				align: "center",
				formatter : function (value, row, index) { switch(value) {case 1 :return "是"; default : return "否"}},
				valign: "middle"
				}, {
				field: "orgid",
				title: "部门编号",
				visible: false,
				align: "center",
				valign: "middle"
				}, {
				field: "upname",
				title: "上级部门名称",
				align: "center",
				valign: "middle"
				}, {
				field: "upid",
				title: "上级部门",
				visible: false,
				align: "center",
				valign: "middle"
				}, {
				field: "orgname",
				title: "部门名称",
				align: "center",
				valign: "middle"
				}, {
				field: "description",
				title: "说明",
				align: "center",
				valign: "middle"
				}, {
				field: "orgtype",
				title: "部门类型",
				visible: false,
				align: "center",
				valign: "middle"
				}, {
				field: "orgtypename",
				title: "部门类型名",
				align: "center",
				valign: "middle"
			}],
			onDblClickRow: function (row) {
				if (actions.includes("220")) {
					row.checked=true;
					expendp($.fn.zTree.getZTreeObj("Tree_all"),$.fn.zTree.getZTreeObj("Tree_all").getNodeByParam("orgid",row.orgid));
					EditTable(row);
				}
			}
		});
		$("#QueryTable").bootstrapTable('showLoading');
		ajaxarr([{
				url:"/func/operator/orgtype_query?operatorno="+employeeno+"&token="+token+"&isused=1",
				title:"获取部门类型信息失败！",
				func: function(data) {
					var orgtype="<option value=''>请选择部门类型名</option>";
					for (i=0,j=data.rows.length;i<j;i++) { orgtype+="<option value='" + data.rows[i].orgtypeid + "'>"+data.rows[i].orgtypename+"</option>";}
					$("#txt_orgtype").html(orgtype);
				}
		}]);
		QueryTable();
		$("#myModal").on("shown.bs.modal",function(e){ if ($("#txt_orgid").attr("disabled")) { $("#txt_upid").focus() } else {$("#txt_orgid").focus()}; });
	});
	
	function AddTable() {//新增
		$("#txt_orgid").val("");
		$("#txt_orgid").attr("disabled",false);
		$("#txt_upid").val("");$("#txt_upid").data("value","");
		$("#txt_orgname").val("");
		$("#txt_description").val("");
		$("#txt_orgtype").selectpicker("val","");
        $("#myModalLabel").html("新增");
        $("#myModal").modal();
	};
	
	function EditTable(row) {
		if (row==null) {
			if ($("#QueryTable").bootstrapTable('getSelections').length == 0) {
				alert("请先选择要修改的数据!");
				return;
			};
			row=$("#QueryTable").bootstrapTable('getSelections')[0];
		}
		if (row.orgid!=null) { $("#txt_orgid").val(row.orgid) } else { $("#txt_orgid").val("")};
		$("#txt_orgid").attr("disabled",true);
		if (row.upid) {
			if (row.upid!=0) {
				expendp($.fn.zTree.getZTreeObj("Tree_up"),$.fn.zTree.getZTreeObj("Tree_up").getNodeByParam("orgid",row.upid));
				$.fn.zTree.getZTreeObj("Tree_up").selectNode($.fn.zTree.getZTreeObj("Tree_up").getNodeByParam("orgid",row.upid),true);
			};
			$("#txt_upid").val(row.upname);
			$("#txt_upid").data("value",row.upid);
		} else {
			$("#txt_upid").val("");
			$("#txt_upid").data("value","");
		};
		if (row.orgname!=null) { $("#txt_orgname").val(row.orgname) } else { $("#txt_orgname").val("")};
		if (row.description!=null) { $("#txt_description").val(row.description) } else { $("#txt_description").val("")};
		if (row.orgtype!=null) { $("#txt_orgtype").selectpicker("val",row.orgtype) } else { $("#txt_orgtype").selectpicker("val","")};
		expendp($.fn.zTree.getZTreeObj("Tree_all"),$.fn.zTree.getZTreeObj("Tree_all").getNodeByParam("orgid",row.orgid));
        $("#myModalLabel").html("修改");
        $("#myModal").modal();
	};
	
	function CommitTable() {
		var commitdata={
			orgid:$("#txt_orgid").val(),
			upid:$("#txt_upid").data("value"),
			orgname:$("#txt_orgname").val(),
			description:$("#txt_description").val(),
			orgtype:$("#txt_orgtype").val()
		};
		if ($("#myModalLabel").html()=="新增") {
			ajaxarr([{
				url:"/func/operator/org_add?operatorno="+employeeno+"&token="+token,
				title:"新增数据失败！",
				data:commitdata,
				func:function(data) {
					alert("新增数据成功！id："+data.id);
					QueryTable(data.id);
				}
			}]);
		} else {
			ajaxarr([{
				url:"/func/operator/org_edit?operatorno="+employeeno+"&token="+token,
				title:"修改数据失败！",
				data:commitdata,
				func:function(data) {
					alert("修改数据成功！");
					QueryTable(commitdata.orgid);
				}
			}]);		
		};
	};
	
	function DelTable() {
        var row = $("#QueryTable").bootstrapTable('getSelections')[0];
        if(row == null) {
            alert("请先选择要要显示/隐藏的数据!");
            return;
        };       
		var info=(row.isused==0) ? "显示" : "隐藏" ;
		if(confirm( "您真的确定要"+info+"吗？") == true) {
			ajaxarr([{
				url: "/func/operator/org_del?operatorno=" + employeeno + "&token=" + token,
				title: info+"数据失败！",
				data:{orgid:row.orgid,isused:(row.isused==0) ? 1 : null},
				func: function(data) {
					alert(info+"成功！");
                    QueryTable();
				}
			}]);
		}
	};
	
	function QueryTable(id) {
		$("#QueryTable").bootstrapTable('showLoading');
		ajaxarr([{
				url:"/func/operator/org_query?operatorno=" + employeeno + "&token=" + token,
				title:"获取部门信息失败，请刷新！",
				data:{},
				func: function (data) {
					setting={view: {selectedMulti: false,showIcon: true },
						data: {	key: { name: "orgname"}, simpleData: {	enable: true,	idKey: "orgid",	pIdKey: "upid",	rootPId: 0}	},
						callback: {
							onDblClick: function(event, treeId, treeNode) {
								$("#txt_orgid").val(treeNode.orgname);
								$("#txt_orgid").data("value",treeNode.orgid);
								$("#orgModal").modal("hide");
							}
						}
					};
					$.fn.zTree.init($("#Tree_up"),setting , data.rows);							
					setting={view: {selectedMulti: false,showIcon: true },
						data: {	key: { name: "orgname"}, simpleData: {	enable: true,	idKey: "orgid",	pIdKey: "upid",	rootPId: 0}	},
						callback: {
							onClick : function(event, treeId, treeNode, clickFlag) {
								$("#QueryTable").bootstrapTable("resetSearch", treeNode.orgid);
							},
							onDblClick: function(event, treeId, treeNode) {
								$("#QueryTable").bootstrapTable('uncheckAll');
								$("#QueryTable").bootstrapTable("checkBy",{field:"orgid",values:[treeNode.orgid]});
								EditTable();
							}
						}
					};
					var zTree=$.fn.zTree.init($("#Tree_all"),setting , data.rows);	
					if (id) {expendp(zTree,zTree.getNodeByParam("orgid",id));};
					$("#QueryTable").bootstrapTable('hideLoading');
					if (data.total==0) { $("#QueryTable").bootstrapTable('removeAll'); } 
					else {	
						$("#QueryTable").bootstrapTable('load', data.rows); 
						if (id) {
							for (var i=data.total;i>0;i--) {
								if (data.rows[i-1].typeid==id) {
									$("#QueryTable").bootstrapTable('selectPage', Math.ceil(i/$("#QueryTable").bootstrapTable('getOptions').pageSize));
									break;
								};							
							}
						}
					};
				}
		}]);		
	};

</script>
	<h4> 选择显示:</h4>
	<div >
		<ul id="Tree_all" class="ztree" ></ul>
	</div>
<table id="QueryTable" class='table-striped'></table>
<div id="toolbar" class="btn-group">
	<button id="219" type="button" style="display:none;" class="btn btn-default" onclick="AddTable()"><span class="glyphicon glyphicon-plus" aria-hidden="true"></span>新增</button>
	<button id="220" type="button" style="display:none;" class="btn btn-default" onclick="EditTable()"><span class="glyphicon glyphicon-pencil" aria-hidden="true"></span>修改</button>
	<button id="221" type="button" style="display:none;" class="btn btn-default" onclick="DelTable()"><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>显示/隐藏</button>
	<button id="222" type="button" style="display:none;" class="btn btn-default" onclick="QueryTable()"><span class="glyphicon glyphico-query" aria-hidden="true"></span>查询</button>
</div>
<div class="modal fade" id="myModal" tabindex="-1" >
	<div class="modal-dialog" >
		<div class="modal-content" >
			<div class="modal-header">
				<h4 class="modal-title" id="myModalLabel"></h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<label for="txt_orgid">部门编号</label><input id="txt_orgid" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_upid.focus()}}" type="text" placeholder="部门编号"/>
				<label for="txt_upid">上级部门</label><input id="txt_upid" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_orgname.focus()}}" data-target="#upModal" data-toggle="modal" type="text" placeholder="上级部门"/>
				<label for="txt_orgname">部门名称</label><input id="txt_orgname" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_description.focus()}}" type="text" placeholder="部门名称"/>
				<label for="txt_description">说明</label><input id="txt_description" class="form-control" onkeypress="{ if (event.keyCode==13) {txt_orgtype.focus()}}" type="text" placeholder="说明"/>
				<label for="txt_orgtype">部门类型</label><select id="txt_orgtype" class="selectpicker form-control" onkeypress="{ if (event.keyCode==13) {SaveModal.focus()}}" placeholder="部门类型"></select>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-primary" id="SaveModal" data-dismiss="modal" onclick="CommitTable()"><span class="glyphicon glyphicon-floppy-disk" aria-hidden="true"></span>保存</button>
				<button type="button" class="btn btn-default" data-dismiss="modal" ><span class="glyphicon glyphicon-remove" aria-hidden="true"></span>关闭</button>
			</div>
		</div>
	</div>
</div>
<div class="modal fade" id="upModal" tabindex="-1">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header" >
				<h4 class="modal-title" >选择上级</h4>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
			</div>
			<div class="modal-body">
				<ul id="Tree_up" class="ztree"></ul>
			</div>
			<div class="modal-footer" >
				<button type="button" class="btn btn-primary" data-dismiss="modal" onclick="{$('#txt_upid').val($.fn.zTree.getZTreeObj('Tree_up').getSelectedNodes()[0].orgname);$('#txt_upid').data('value',$.fn.zTree.getZTreeObj('Tree_up').getSelectedNodes()[0].orgid);}">确认</button>
				<button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
			</div>
		</div>
	</div>
</div>
